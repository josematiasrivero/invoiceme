services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: invoiceme
      POSTGRES_PASSWORD: invoiceme
      POSTGRES_DB: invoiceme
    volumes:
      - /mnt/data/apps/invoiceme/postgres:/var/lib/postgresql/data
    ports:
      - "6010:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoiceme"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgweb:
    image: sosedoff/pgweb
    restart: unless-stopped
    ports:
      - "6011:8081"
    environment:
      PGWEB_DATABASE_URL: postgresql://invoiceme:invoiceme@postgres:5432/invoiceme?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - /mnt/data/apps/invoiceme/minio:/data
    ports:
      - "6012:9000"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/invoiceme;
      mc anonymous set download local/invoiceme;
      exit 0;
      "

  app:
    build: .
    restart: unless-stopped
    ports:
      - "6000:3000"
    environment:
      DATABASE_URL: postgresql://invoiceme:invoiceme@postgres:5432/invoiceme
      AUTH_SECRET: invoiceme-production-secret-change-me
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
